name: gym-availability-check

on:
  schedule:
    # GitHub Actionsのscheduleは実測上、15分/30分間隔などの高頻度指定でも
    # 間引かれて実際には概ね1時間に1回程度しか発火しない(GitHub側の既知の制限)。
    # そのため起動自体は1時間に1回(毎時0分ちょうどは混雑するため3分にずらす)に留め、
    # ジョブ内部で15分間隔のループを回すことで実質15分間隔のチェックを実現する。
    - cron: "3 * * * *"
  workflow_dispatch: {}   # 手動実行も可

permissions:
  contents: write          # state.json / log.txt をコミットし直すため

concurrency:
  group: gym-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chrome
          python -m playwright install-deps chromium
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Run notifier (looped every 15min, headless)
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          HEADLESS: "new"          # ヘッドレスで実行
          CHROME_CHANNEL: chrome
        run: |
          git config user.name  "gym-bot"
          git config user.email "gym-bot@users.noreply.github.com"
          # 1時間のジョブ内で15分おきに最大4回チェックする。
          # (ジョブ開始が毎時3分想定なので 3分/18分/33分/48分相当で実行される)
          for i in 1 2 3 4; do
            echo "===== iteration $i/4 $(date -u +%FT%TZ) ====="
            python scraper.py || true

            # 反復ごとに state.json / log.txt を都度コミットしておく
            # (途中で失敗・タイムアウトしても検知結果と通知履歴を失わないため)
            git add state.json log.txt 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "update state [skip ci]"
              git pull --rebase --autostash origin "${{ github.ref_name }}" || true
              git push || true
            else
              echo "no state change"
            fi

            if [ "$i" -lt 4 ]; then
              sleep 900
            fi
          done

      - name: Upload debug (on failure to parse)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            debug_page.html
            debug.png
          if-no-files-found: ignore
          retention-days: 3
